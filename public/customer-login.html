<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJ Vendor Portal — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-brand">
      <div class="brand-icon"><img src="/aj-logo.png" alt="AJ" class="brand-logo-img" /></div>
    </div>

    <div class="auth-card">

      <div class="auth-alert" id="authAlert" style="display:none"></div>

      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="l-email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="l-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="l-password"><i class="fas fa-lock"></i> Password</label>
          <div class="input-eye-wrap">
            <input type="password" id="l-password" placeholder="Your password" required autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="togglePwd('l-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
          <span class="btn-spinner" style="display:none"><i class="fas fa-circle-notch fa-spin"></i> Signing in…</span>
        </button>

        <p class="auth-hint" style="margin-top:18px;font-size:12px;color:#94a3b8;text-align:center;line-height:1.6">
          <i class="fas fa-info-circle"></i> Accounts are created by your account manager.<br />
          If you don't have credentials yet, please contact us.
        </p>
      </form>
    </div>

    <p class="auth-footer">
      AJ Vendor Portal &copy; <span id="yr"></span> &mdash; Track your tier &amp; rewards.
    </p>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    async function handleLogin(e) {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-password').value;
      setLoading(btn, true); hideAlert();
      try {
        const res = await fetch('/api/customer-auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        location.href = '/customer-dashboard.html';
      } catch (err) {
        showAlert(err.message, 'error');
        setLoading(btn, false);
      }
    }

    function setLoading(btn, on) {
      btn.querySelector('.btn-text').style.display    = on ? 'none' : '';
      btn.querySelector('.btn-spinner').style.display = on ? '' : 'none';
      btn.disabled = on;
    }
    function showAlert(msg, type) {
      const el = document.getElementById('authAlert');
      el.textContent = msg;
      el.className   = `auth-alert ${type}`;
      el.style.display = '';
    }
    function hideAlert() { document.getElementById('authAlert').style.display = 'none'; }
    function togglePwd(inputId, btn) {
      const inp = document.getElementById(inputId);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      btn.querySelector('i').className = `fas fa-eye${isHidden ? '-slash' : ''}`;
    }
  </script>
</body>
</html>
