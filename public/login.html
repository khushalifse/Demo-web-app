<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ BookPro — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="auth-bg">
    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-wrapper">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-icon"><img src="/aj-logo.png" alt="AJ" class="brand-logo-img" /></div>
      <div class="brand-name">DJ <strong>Studio</strong></div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Error / Success banner -->
      <div class="auth-alert" id="authAlert" style="display:none"></div>

      <!-- ── LOGIN FORM ─────────────────────────────────────────────────── -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="l-email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="l-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="l-password"><i class="fas fa-lock"></i> Password</label>
          <div class="input-eye-wrap">
            <input type="password" id="l-password" placeholder="Your password" required autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="togglePwd('l-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
          <span class="btn-spinner" style="display:none"><i class="fas fa-circle-notch fa-spin"></i> Signing in…</span>
        </button>
      </form>

      <!-- ── SIGNUP FORM ────────────────────────────────────────────────── -->
      <form id="signupForm" class="auth-form" style="display:none" onsubmit="handleSignup(event)" novalidate>
        <div class="form-group">
          <label for="s-name"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="s-name" placeholder="Your name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="s-email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="s-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="s-password"><i class="fas fa-lock"></i> Password <span class="hint">(min. 6 chars)</span></label>
          <div class="input-eye-wrap">
            <input type="password" id="s-password" placeholder="Create a password" required autocomplete="new-password" minlength="6" />
            <button type="button" class="eye-btn" onclick="togglePwd('s-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" id="signupBtn">
          <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
          <span class="btn-spinner" style="display:none"><i class="fas fa-circle-notch fa-spin"></i> Creating account…</span>
        </button>
      </form>

      <!-- ── DIVIDER ────────────────────────────────────────────────────── -->
      <div class="auth-divider" id="googleDivider" style="display:none">
        <span>or</span>
      </div>

      <!-- ── GOOGLE BUTTON ──────────────────────────────────────────────── -->
      <button class="btn-google" id="googleBtn" style="display:none" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.6 0 6.6 5.4 2.8 13.2l7.9 6.1C12.5 13 17.8 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.4-4.1 7-10.1 7-17.1z"/>
          <path fill="#FBBC05" d="M10.7 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A23.8 23.8 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l8.1-6.2z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6.2 0-11.5-4.2-13.4-9.9l-8.1 6.2C6.7 42.7 14.7 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

    </div><!-- /auth-card -->

    <p class="auth-footer">
      DJ BookPro &copy; <span id="yr"></span> &mdash; Manage your gigs professionally.
    </p>
  </div>

  <script>
    /* ── Check URL errors ── */
    const urlErr = new URLSearchParams(location.search).get('error');
    if (urlErr) {
      const msgs = {
        google_not_configured: 'Google sign-in is not configured. Please use email & password.',
        google_denied: 'Google sign-in was cancelled.',
        google_failed: 'Google sign-in failed. Please try again or use email & password.',
      };
      showAlert(msgs[urlErr] || 'An error occurred. Please try again.', 'error');
    }

    /* ── Check if Google OAuth is enabled ── */
    fetch('/api/auth/config')
      .then(r => r.json())
      .then(cfg => {
        if (cfg.googleEnabled) {
          document.getElementById('googleDivider').style.display = '';
          document.getElementById('googleBtn').style.display = '';
        }
      });

    document.getElementById('yr').textContent = new Date().getFullYear();

    /* ── Tab switch ── */
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').style.display  = isLogin ? '' : 'none';
      document.getElementById('signupForm').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').classList.toggle('active',  isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
      hideAlert();
    }

    /* ── Login ── */
    async function handleLogin(e) {
      e.preventDefault();
      const btn  = document.getElementById('loginBtn');
      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-password').value;
      setLoading(btn, true);
      hideAlert();

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        location.href = '/';
      } catch (err) {
        showAlert(err.message, 'error');
        setLoading(btn, false);
      }
    }

    /* ── Signup ── */
    async function handleSignup(e) {
      e.preventDefault();
      const btn  = document.getElementById('signupBtn');
      const name     = document.getElementById('s-name').value.trim();
      const email    = document.getElementById('s-email').value.trim();
      const password = document.getElementById('s-password').value;
      setLoading(btn, true);
      hideAlert();

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.', 'error');
        return setLoading(btn, false);
      }

      try {
        const res  = await fetch('/api/auth/signup', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Signup failed');
        location.href = '/';
      } catch (err) {
        showAlert(err.message, 'error');
        setLoading(btn, false);
      }
    }

    /* ── Google ── */
    function loginWithGoogle() {
      location.href = '/api/auth/google';
    }

    /* ── Helpers ── */
    function setLoading(btn, on) {
      btn.querySelector('.btn-text').style.display   = on ? 'none' : '';
      btn.querySelector('.btn-spinner').style.display = on ? '' : 'none';
      btn.disabled = on;
    }

    function showAlert(msg, type) {
      const el = document.getElementById('authAlert');
      el.textContent = msg;
      el.className   = `auth-alert ${type}`;
      el.style.display = '';
    }
    function hideAlert() {
      document.getElementById('authAlert').style.display = 'none';
    }

    function togglePwd(inputId, btn) {
      const inp = document.getElementById(inputId);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      btn.querySelector('i').className = `fas fa-eye${isHidden ? '-slash' : ''}`;
    }
  </script>
</body>
</html>
